<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raffaele</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      color: #e0e0e0;
      font-size: 2rem;
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 280px;
    }

    nav a {
      display: block;
      text-align: center;
      padding: 1rem 2rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-transform: uppercase;
      color: #fff;
      background: #16213e;
      border: 2px solid #0f3460;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    nav a:hover {
      background: #0f3460;
      border-color: #e94560;
      transform: translateY(-2px);
    }

    nav a:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Raffaele</h1>
  <nav>
    <a href="timeline.html">Timeline</a>
    <a href="lamp.png">Lamp</a>
    <a href="eniac.jpg">Eniac</a>
  </nav>
</body>
</html>
